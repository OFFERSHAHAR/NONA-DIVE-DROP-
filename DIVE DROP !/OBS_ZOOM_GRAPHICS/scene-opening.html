<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <link rel="stylesheet" href="obs-styles.css" />
    <title>DiveDrop MVP Opening</title>
  </head>
  <body>
    <main class="scene">
      <img class="scene-bg" src="assets/obs-bg-main.png" alt="" />
      <div class="shade"></div>
      <img class="waterline" src="assets/obs-waterline.png" alt="" />
      <header class="topbar">
        <img class="logo" src="assets/obs-logo-white.png" alt="DiveDrop" />
        <div class="pill">MVP חי להצגה</div>
      </header>
      <section class="content">
        <div class="copy">
          <span class="eyebrow">DiveDrop WebApp</span>
          <h1>ממשק אחד לצלילה, שאטל ומדריכים</h1>
          <p class="lead">הדגמה מהירה של חיפוש אתר, בחירת פעילות, תיאום מדריך, הסעה ופתיחת בקשת הזמנה אמיתית.</p>
        </div>
        <div class="panel">
          <img src="assets/obs-ui-board.png" alt="" />
        </div>
      </section>
    </main>
  </body>
</html>
