<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <link rel="stylesheet" href="obs-styles.css" />
    <title>DiveDrop Instructors</title>
  </head>
  <body>
    <main class="scene">
      <img class="scene-bg" src="assets/obs-bg-instructors.png" alt="" />
      <div class="shade"></div>
      <header class="topbar">
        <img class="logo" src="assets/obs-logo-white.png" alt="DiveDrop" />
        <div class="pill">מסלול מדריכים</div>
      </header>
      <section class="content">
        <div class="copy">
          <span class="eyebrow">למדריכים מיועדים</span>
          <h1>מופיעים בממשק לפי רמה, זמינות ואתר</h1>
          <p class="lead">המטרה בהצגה: להראות איך מדריך מקבל ליד מסודר, רואה פעילות מתאימה, ומקושר להזמנה בלי שיחות מבולגנות.</p>
        </div>
        <div class="panel">
          <img src="assets/obs-flow.png" alt="" />
          <div class="steps">
            <div class="step"><div class="num">1</div><div><strong>לקוח בוחר אתר</strong><span>עומק, קושי וזמן פעילות</span></div></div>
            <div class="step"><div class="num">2</div><div><strong>התאמת מדריך</strong><span>לפי הסמכה וזמינות</span></div></div>
            <div class="step"><div class="num">3</div><div><strong>בקשה נשמרת</strong><span>שם, טלפון, תאריך והערות</span></div></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
