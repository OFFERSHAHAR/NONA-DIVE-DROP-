<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <link rel="stylesheet" href="obs-styles.css" />
    <title>DiveDrop Shuttle Drivers</title>
  </head>
  <body>
    <main class="scene">
      <img class="scene-bg" src="assets/obs-bg-main.png" alt="" />
      <div class="shade"></div>
      <header class="topbar">
        <img class="logo" src="assets/obs-logo-white.png" alt="DiveDrop" />
        <div class="pill">מסלול נהגי שאטלים</div>
      </header>
      <img class="floating-asset" src="assets/obs-van.png" alt="" />
      <section class="content">
        <div class="copy">
          <span class="eyebrow">לנהגים ולמערך הסעות</span>
          <h1>איסוף מסודר לצוללים, ציוד וחזרה מהאתר</h1>
          <p class="lead">ההצגה מדגישה איך שאטל מתחבר להזמנה, לאתר הצלילה, לשעת יציאה ולצרכי הציוד.</p>
        </div>
        <div class="panel">
          <div class="steps">
            <div class="step"><div class="num">1</div><div><strong>נקודת איסוף</strong><span>מלון, מרכז או מועדון</span></div></div>
            <div class="step"><div class="num">2</div><div><strong>תיאום ציוד</strong><span>מקום לציוד רטוב ויבש</span></div></div>
            <div class="step"><div class="num">3</div><div><strong>מסלול חזרה</strong><span>אחרי הצלילה או הפעילות</span></div></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
