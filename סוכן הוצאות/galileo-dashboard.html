<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גלילאו · מרכז ניהול</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --brand:#1565c0; --brand-d:#0d47a1; --accent:#eaf4ff;
    --bg:#f4f7fb; --card:#ffffff; --ink:#1a2433; --muted:#6b7a90;
    --line:#e4e9f2; --good:#16a34a; --warn:#f59e0b; --bad:#dc2626;
    --good-bg:#e9f9ef; --warn-bg:#fef6e7; --bad-bg:#fdecec;
    --shadow:0 1px 3px rgba(16,32,64,.06),0 8px 24px rgba(16,32,64,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Rubik,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .app{display:flex;min-height:100vh}
  .side{width:248px;background:linear-gradient(180deg,var(--brand-d),var(--brand));color:#fff;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;border-bottom:1px solid rgba(255,255,255,.18);margin-bottom:12px}
  .brand .logo{width:42px;height:42px;border-radius:12px;background:#fff;color:var(--brand);display:grid;place-items:center;font-size:22px;font-weight:800}
  .brand b{font-size:18px;display:block;line-height:1.1}
  .brand small{opacity:.8;font-size:12px}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
  .nav button{display:flex;align-items:center;gap:11px;background:transparent;border:0;color:#eaf2ff;padding:11px 13px;border-radius:11px;cursor:pointer;font-size:15px;font-family:inherit;text-align:right;transition:.15s;width:100%}
  .nav button .ic{width:22px;text-align:center;font-size:17px}
  .nav button .cnt{margin-inline-start:auto;background:rgba(255,255,255,.16);padding:1px 9px;border-radius:20px;font-size:12px;font-weight:700}
  .nav button:hover{background:rgba(255,255,255,.12)}
  .nav button.active{background:#fff;color:var(--brand-d);font-weight:700;box-shadow:var(--shadow)}
  .nav button.active .cnt{background:var(--accent);color:var(--brand-d)}
  .side-foot{margin-top:auto;font-size:12px;opacity:.78;padding:10px 8px;border-top:1px solid rgba(255,255,255,.18)}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:16px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
  .topbar h1{margin:0;font-size:20px;font-weight:800}
  .topbar .sub{color:var(--muted);font-size:13px}
  .search{margin-inline-start:auto;position:relative}
  .search input{border:1px solid var(--line);background:#fff;border-radius:11px;padding:10px 38px 10px 14px;font-size:14px;width:260px;font-family:inherit;outline:none}
  .search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--accent)}
  .search .si{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .content{padding:24px 28px 48px;max-width:1320px;width:100%;margin:0 auto}
  .view{display:none;animation:fade .25s ease}
  .view.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .lbl{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:8px}
  .kpi .val{font-size:30px;font-weight:800;line-height:1}
  .kpi .ft{font-size:12px;margin-top:8px;color:var(--muted)}
  .kpi .ic{position:absolute;left:14px;top:14px;font-size:24px;opacity:.18}
  .kpi.b-good{border-top:3px solid var(--good)} .kpi.b-warn{border-top:3px solid var(--warn)}
  .kpi.b-bad{border-top:3px solid var(--bad)} .kpi.b-brand{border-top:3px solid var(--brand)}
  .grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-bottom:22px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .panel .ph{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .panel .ph h3{margin:0;font-size:15px;font-weight:700}
  .panel .ph .tag{margin-inline-start:auto;font-size:12px;color:var(--muted)}
  .panel .pb{padding:16px 18px}
  .chartbox{position:relative;height:240px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 15px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--muted);transition:.15s}
  .chip:hover{border-color:var(--brand);color:var(--brand)}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:600}
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{background:#f7f9fc;text-align:right;padding:13px 16px;font-weight:700;color:var(--muted);font-size:12.5px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:12px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#fafcff}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap}
  .p-good{background:var(--good-bg);color:var(--good)} .p-warn{background:var(--warn-bg);color:#b45309}
  .p-bad{background:var(--bad-bg);color:var(--bad)} .p-mut{background:#eef1f6;color:var(--muted)}
  .p-brand{background:var(--accent);color:var(--brand-d)}
  .num{font-variant-numeric:tabular-nums;font-weight:700}
  .name{font-weight:600}
  .sub-t{color:var(--muted);font-size:12px}
  .empty{padding:48px;text-align:center;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:8px}
  .count-row{padding:11px 18px;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line);background:#fbfcfe}
  .av{width:30px;height:30px;border-radius:9px;background:var(--accent);color:var(--brand-d);display:inline-grid;place-items:center;font-size:14px;font-weight:700;margin-inline-end:8px;vertical-align:middle}
  .bars{display:flex;flex-direction:column;gap:11px}
  .bar-row{display:flex;align-items:center;gap:12px;font-size:13px}
  .bar-row .bl{width:92px;color:var(--muted);flex-shrink:0}
  .bar-track{flex:1;height:10px;background:#eef1f6;border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;background:var(--brand)}
  .bar-row .bv{width:38px;text-align:left;font-weight:700;font-variant-numeric:tabular-nums}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  @media(max-width:760px){.side{position:fixed;z-index:50;transform:translateX(100%);transition:.25s}.side.open{transform:none}.menu-btn{display:inline-flex!important}.search input{width:150px}}
  .menu-btn{display:none;background:var(--accent);border:0;color:var(--brand);width:40px;height:40px;border-radius:10px;font-size:20px;cursor:pointer}
</style>
</head>

      <div class="logo">G</div>

    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot" id="foot"></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
      <div>
        <h1 id="vtitle">סקירה כללית</h1>
        <div class="sub" id="vsub"></div>
      </div>
      <div class="search">
        <span class="si">🔍</span>
        <input id="q" placeholder="חיפוש לקוח / מפעיל…" oninput="onSearch(this.value)">
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const DATA = JSON.parse(document.getElementById('galileo-data').textContent);
const READINGS = Object.values(DATA.lastReadings||{});
const ORDERS = DATA.adminOrders||[];
const TASKS = DATA.tasks||[];
const ISSUES = DATA.issues||[];
const USERS = DATA.users||[];

/* ---------- health helpers ---------- */
function clState(c){
  if(c===''||c==null||typeof c==='string') return c?{k:'warn',t:String(c)}:{k:'mut',t:'—'};
  c=+c;
  if(c<=0) return {k:'bad',t:'0 · אין כלור'};
  if(c<1) return {k:'warn',t:c+' · נמוך'};
  if(c<=3) return {k:'good',t:c+' · תקין'};
  if(c<=5) return {k:'warn',t:c+' · גבוה'};
  return {k:'bad',t:c+' · גבוה מאוד'};
}
function phState(p){
  if(p===''||p==null) return {k:'mut',t:'—'};
  if(typeof p==='string') return {k:'warn',t:p};
  p=+p; if(p<=0) return {k:'mut',t:'—'};
  if(p<7) return {k:'bad',t:p+' · נמוך'};
  if(p<7.2) return {k:'warn',t:p+' · נמוך'};
  if(p<=7.6) return {k:'good',t:p+' · תקין'};
  if(p<=7.8) return {k:'warn',t:p+' · גבוה'};
  return {k:'bad',t:p+' · גבוה'};
}
const PK={good:'p-good',warn:'p-warn',bad:'p-bad',mut:'p-mut'};
function pill(s){return `<span class="pill ${PK[s.k]}">${s.t}</span>`}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* count pools needing attention (cl or ph bad/warn) */
function poolAlert(r){
  const c=clState(r.chlorine), p=phState(r.ph);
  if(c.k==='bad'||p.k==='bad') return 'bad';
  if(c.k==='warn'||p.k==='warn') return 'warn';
  if(c.k==='good') return 'good';
  return 'mut';
}

/* ---------- state ---------- */
let active='overview', search='';
const COUNTS={overview:'',pools:READINGS.length,orders:ORDERS.length,tasks:TASKS.length,issues:ISSUES.length,team:USERS.length};
const NAV=[
  {id:'overview',ic:'📊',t:'סקירה כללית',sub:'מבט-על על כל הדוחות'},
  {id:'pools',ic:'💧',t:'בריכות וקריאות',sub:READINGS.length+' בריכות · כלור, pH וסטטוס'},
  {id:'orders',ic:'📋',t:'הזמנות עבודה',sub:ORDERS.length+' הזמנות · סדר יום למפעילים'},
  {id:'tasks',ic:'✅',t:'משימות',sub:TASKS.length+' משימות'},
  {id:'issues',ic:'⚠️',t:'תקלות',sub:ISSUES.length+' תקלות פתוחות'},
  {id:'team',ic:'👥',t:'צוות',sub:USERS.length+' משתמשים'},
];

/* ---------- nav ---------- */
function buildNav(){
  document.getElementById('nav').innerHTML=NAV.map(n=>`
    <button data-id="${n.id}" onclick="go('${n.id}')">
      <span class="ic">${n.ic}</span><span>${n.t}</span>
      ${COUNTS[n.id]!==''?`<span class="cnt">${COUNTS[n.id]}</span>`:''}
    </button>`).join('');
  document.getElementById('foot').innerHTML=
    `חשבון <b>${esc(DATA.account.name)}</b> · ${esc(DATA.account.plan)}<br>בעלים: ${esc(DATA.account.owner)}<br>עודכן: ${esc(DATA.generatedAt)}`;
}
function go(id){
  active=id;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  const n=NAV.find(x=>x.id===id);
  document.getElementById('vtitle').textContent=n.t;
  document.getElementById('vsub').textContent=n.sub;
  document.getElementById('side').classList.remove('open');
  render();
}
function onSearch(v){search=v.trim();render()}
function match(...f){if(!search)return true;const s=search.toLowerCase();return f.some(x=>String(x==null?'':x).toLowerCase().includes(s))}

/* ---------- renderers ---------- */
let charts=[];
function clearCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[]}

function render(){
  clearCharts();
  const c=document.getElementById('content');
  if(active==='overview') c.innerHTML=viewOverview();
  else if(active==='pools') c.innerHTML=viewPools();
  else if(active==='orders') c.innerHTML=viewOrders();
  else if(active==='tasks') c.innerHTML=viewTasks();
  else if(active==='issues') c.innerHTML=viewIssues();
  else if(active==='team') c.innerHTML=viewTeam();
  if(active==='overview') drawOverviewCharts();
}

/* OVERVIEW */
function viewOverview(){
  const alerts=READINGS.map(poolAlert);
  const bad=alerts.filter(a=>a==='bad').length;
  const warn=alerts.filter(a=>a==='warn').length;
  const good=alerts.filter(a=>a==='good').length;
  const ordPend=ORDERS.filter(o=>o.status==='pending').length;
  const taskPend=TASKS.filter(t=>t.status==='pending'||t.status==='open').length;
  const crit=ISSUES.filter(i=>i.severity==='קריטי').length;
  const ops=USERS.filter(u=>u.role==='operator').length;

  const kpis=[
    {c:'b-brand',ic:'💧',lbl:'בריכות במעקב',val:READINGS.length,ft:ops+' מפעילים פעילים'},
    {c:'b-good',ic:'✅',lbl:'בריכות תקינות',val:good,ft:Math.round(good/READINGS.length*100)+'% מהבריכות'},
    {c:'b-warn',ic:'⚠️',lbl:'דורשות תשומת לב',val:warn,ft:'כלור / pH חורגים'},
    {c:'b-bad',ic:'🚨',lbl:'במצב חריג',val:bad,ft:'0 כלור או חריגה חדה'},
    {c:'b-brand',ic:'📋',lbl:'הזמנות פתוחות',val:ordPend,ft:'בסדר היום'},
    {c:'b-bad',ic:'🔧',lbl:'תקלות פתוחות',val:ISSUES.length,ft:crit+' קריטיות'},
  ];
  // recent critical readings list (bad pools)
  const badPools=READINGS.filter(r=>poolAlert(r)==='bad').slice(0,8);

  return `
  <div class="kpis">
    ${kpis.map(k=>`<div class="kpi ${k.c}"><div class="ic">${k.ic}</div><div class="lbl">${k.lbl}</div><div class="val">${k.val}</div><div class="ft">${k.ft}</div></div>`).join('')}
  </div>
  <div class="grid2">
    <div class="panel">
      <div class="ph"><h3>חלוקת כלור בבריכות</h3><span class="tag">קריאות אחרונות</span></div>
      <div class="pb"><div class="chartbox"><canvas id="chCl"></canvas></div>
        <div class="legend">
          <span><i class="dot" style="background:var(--bad)"></i>אין כלור (0)</span>
          <span><i class="dot" style="background:var(--warn)"></i>נמוך (&lt;1)</span>
          <span><i class="dot" style="background:var(--good)"></i>תקין (1–3)</span>
          <span><i class="dot" style="background:#f59e0b"></i>גבוה (3–5)</span>
          <span><i class="dot" style="background:var(--bad)"></i>גבוה מאוד (5+)</span>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="ph"><h3>סטטוס בריכות</h3></div>
      <div class="pb"><div class="chartbox"><canvas id="chStat"></canvas></div></div>
    </div>
  </div>
  <div class="grid2">
    <div class="panel">
      <div class="ph"><h3>הזמנות עבודה לפי יום</h3><span class="tag">סדר יום</span></div>
      <div class="pb"><div class="chartbox"><canvas id="chOrders"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="ph"><h3>עומס לפי מפעיל</h3></div>
      <div class="pb">${barList(opLoad())}</div>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><h3>🚨 בריכות שדורשות טיפול מיידי</h3><span class="tag">${badPools.length} בריכות</span></div>
    ${badPools.length?`<table><thead><tr><th>לקוח</th><th>כלור</th><th>pH</th><th>תאריך קריאה</th><th>הערה</th></tr></thead><tbody>
      ${badPools.map(r=>`<tr><td class="name">${esc(r.client)}</td><td>${pill(clState(r.chlorine))}</td><td>${pill(phState(r.ph))}</td><td class="sub-t">${esc(r.date)}</td><td class="sub-t">${esc(r.customStatusText||r.notes||'—')}</td></tr>`).join('')}
    </tbody></table>`:`<div class="empty"><div class="big">✅</div>אין בריכות במצב חריג</div>`}
  </div>`;
}
function opLoad(){
  const m={};ORDERS.forEach(o=>m[o.operator]=(m[o.operator]||0)+1);
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({l:k,v}));
}
function barList(rows){
  const max=Math.max(1,...rows.map(r=>r.v));
  return `<div class="bars">${rows.map(r=>`<div class="bar-row"><div class="bl">${esc(r.l)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.v/max*100)}%"></div></div><div class="bv">${r.v}</div></div>`).join('')}</div>`;
}
function drawOverviewCharts(){
  const buckets={'אין כלור':0,'נמוך':0,'תקין':0,'גבוה':0,'גבוה מאוד':0};
  READINGS.forEach(r=>{let c=r.chlorine; if(typeof c!=='number'){return} if(c<=0)buckets['אין כלור']++;else if(c<1)buckets['נמוך']++;else if(c<=3)buckets['תקין']++;else if(c<=5)buckets['גבוה']++;else buckets['גבוה מאוד']++;});
  charts.push(new Chart(document.getElementById('chCl'),{type:'bar',data:{labels:Object.keys(buckets),datasets:[{data:Object.values(buckets),backgroundColor:['#dc2626','#f59e0b','#16a34a','#f59e0b','#dc2626'],borderRadius:7}]},options:barOpts()}));

  const st={};READINGS.forEach(r=>{const k=r.poolStatus||'לא צוין';st[k]=(st[k]||0)+1});
  charts.push(new Chart(document.getElementById('chStat'),{type:'doughnut',data:{labels:Object.keys(st),datasets:[{data:Object.values(st),backgroundColor:['#1565c0','#16a34a','#f59e0b','#94a3b8','#dc2626'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{font:{family:'Segoe UI',size:12},padding:14}}}}}));

  const byDay={};ORDERS.forEach(o=>byDay[o.date]=(byDay[o.date]||0)+1);
  const days=Object.keys(byDay).sort();
  charts.push(new Chart(document.getElementById('chOrders'),{type:'line',data:{labels:days.map(d=>d.slice(5)),datasets:[{data:days.map(d=>byDay[d]),borderColor:'#1565c0',backgroundColor:'rgba(21,101,192,.12)',fill:true,tension:.35,pointRadius:4,pointBackgroundColor:'#1565c0'}]},options:barOpts()}));
}
function barOpts(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{family:'Segoe UI'}}},y:{beginAtZero:true,ticks:{precision:0,font:{family:'Segoe UI'}},grid:{color:'#eef1f6'}}}}}

/* POOLS */
let poolFilter='all';
function setPF(f){poolFilter=f;render()}
function viewPools(){
  let rows=READINGS.filter(r=>match(r.client,r.operator,r.poolStatus));
  rows=rows.filter(r=>{const a=poolAlert(r);if(poolFilter==='all')return true;if(poolFilter==='attention')return a==='warn'||a==='bad';return a===poolFilter});
  rows.sort((a,b)=>({bad:0,warn:1,good:2,mut:3})[poolAlert(a)]-({bad:0,warn:1,good:2,mut:3})[poolAlert(b)]);
  const f=[['all','הכל',READINGS.length],['bad','חריג',READINGS.filter(r=>poolAlert(r)==='bad').length],['warn','דורש תשומת לב',READINGS.filter(r=>poolAlert(r)==='warn').length],['good','תקין',READINGS.filter(r=>poolAlert(r)==='good').length]];
  return `
  <div class="filters">${f.map(([k,t,n])=>`<button class="chip ${poolFilter===k?'on':''}" onclick="setPF('${k}')">${t} · ${n}</button>`).join('')}</div>
  <div class="tablewrap">
    <div class="count-row">מציג ${rows.length} בריכות</div>
    ${rows.length?`<table><thead><tr><th>לקוח</th><th>כלור (ppm)</th><th>pH</th><th>סטטוס בריכה</th><th>תאריך</th><th>הערה / הגבלה</th></tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td><span class="dot" style="background:var(--${poolAlert(r)==='mut'?'muted':poolAlert(r)});margin-inline-end:8px"></span><span class="name">${esc(r.client)}</span></td>
      <td>${pill(clState(r.chlorine))}</td>
      <td>${pill(phState(r.ph))}</td>
      <td><span class="pill p-brand">${esc(r.poolStatus||'—')}</span></td>
      <td class="sub-t">${esc(r.date)}</td>
      <td class="sub-t">${esc(r.customStatusText||r.notes||'—')}</td>
    </tr>`).join('')}
    </tbody></table>`:emptyTable()}
  </div>`;
}

/* ORDERS */
let orderFilter='all';
function setOF(f){orderFilter=f;render()}
function viewOrders(){
  const ops=[...new Set(ORDERS.map(o=>o.operator))];
  let rows=ORDERS.filter(o=>match(o.client,o.operator,o.adminNote));
  if(orderFilter!=='all') rows=rows.filter(o=>o.operator===orderFilter);
  rows.sort((a,b)=>(a.date<b.date?1:-1)||(a.orderIndex-b.orderIndex));
  const f=[['all','כל המפעילים',ORDERS.length],...ops.map(o=>[o,o,ORDERS.filter(x=>x.operator===o).length])];
  return `
  <div class="filters">${f.map(([k,t,n])=>`<button class="chip ${orderFilter===k?'on':''}" onclick="setOF('${esc(k)}')">${esc(t)} · ${n}</button>`).join('')}</div>
  <div class="tablewrap">
    <div class="count-row">מציג ${rows.length} הזמנות עבודה</div>
    ${rows.length?`<table><thead><tr><th>תאריך</th><th>לקוח</th><th>מפעיל</th><th>#</th><th>סטטוס</th><th>הערת מנהל</th></tr></thead><tbody>
    ${rows.map(o=>`<tr>
      <td class="sub-t">${esc(o.date)}</td>
      <td class="name">${esc(o.client)}</td>
      <td>${esc(o.operator)}</td>
      <td class="num">${o.orderIndex??'—'}</td>
      <td><span class="pill ${o.status==='done'?'p-good':'p-warn'}">${o.status==='done'?'בוצעה':'ממתינה'}</span></td>
      <td class="sub-t">${esc(o.adminNote||'—')}</td>
    </tr>`).join('')}
    </tbody></table>`:emptyTable()}
  </div>`;
}

/* TASKS */
function viewTasks(){
  let rows=TASKS.filter(t=>match(t.client,(t.operators||[]).join(' ')));
  return `<div class="tablewrap">
    <div class="count-row">מציג ${rows.length} משימות</div>
    ${rows.length?`<table><thead><tr><th>תאריך</th><th>לקוח</th><th>מפעילים</th><th>סטטוס</th></tr></thead><tbody>
    ${rows.map(t=>`<tr><td class="sub-t">${esc(t.date)}</td><td class="name">${esc(t.client)}</td><td>${esc((t.operators||[]).join(', '))}</td>
      <td><span class="pill ${t.status==='done'?'p-good':'p-warn'}">${t.status==='done'?'בוצעה':'ממתינה'}</span></td></tr>`).join('')}
    </tbody></table>`:emptyTable()}
  </div>`;
}

/* ISSUES */
function viewIssues(){
  let rows=ISSUES.filter(i=>match(i.client,i.operator,i.desc));
  rows.sort((a,b)=>(a.severity==='קריטי'?0:1)-(b.severity==='קריטי'?0:1));
  return `<div class="tablewrap">
    <div class="count-row">מציג ${rows.length} תקלות</div>
    ${rows.length?`<table><thead><tr><th>חומרה</th><th>לקוח</th><th>תיאור</th><th>מפעיל</th><th>תאריך</th><th>סטטוס</th></tr></thead><tbody>
    ${rows.map(i=>`<tr>
      <td><span class="pill ${i.severity==='קריטי'?'p-bad':'p-warn'}">${esc(i.severity)}</span></td>
      <td class="name">${esc(i.client)}</td>
      <td>${esc(i.desc)}</td>
      <td>${esc(i.operator)}</td>
      <td class="sub-t">${esc(i.date)}</td>
      <td><span class="pill p-mut">${esc(i.status)}</span></td>
    </tr>`).join('')}
    </tbody></table>`:emptyTable()}
  </div>`;
}

/* TEAM */
const ROLE={admin:'מנהל',operator:'מפעיל',sub_operator:'מפעיל משנה'};
function viewTeam(){
  let rows=USERS.filter(u=>match(u.name,u.phone,ROLE[u.role]));
  return `<div class="tablewrap">
    <div class="count-row">מציג ${rows.length} משתמשים</div>
    <table><thead><tr><th>שם</th><th>תפקיד</th><th>טלפון</th><th>שיוך</th></tr></thead><tbody>
    ${rows.map(u=>`<tr>
      <td><span class="av">${u.icon||esc((u.name||'?')[0])}</span><span class="name">${esc(u.name)}</span></td>
      <td><span class="pill ${u.role==='admin'?'p-brand':u.role==='operator'?'p-good':'p-mut'}">${ROLE[u.role]||esc(u.role)}</span></td>
      <td class="sub-t">${esc(u.phone||'—')}</td>
      <td class="sub-t">${esc(u.linkedOperator||'—')}</td>
    </tr>`).join('')}
    </tbody></table>
  </div>`;
}
function emptyTable(){return `<div class="empty"><div class="big">🔍</div>לא נמצאו תוצאות${search?` עבור "${esc(search)}"`:''}</div>`}

buildNav();go('overview');
</script>
</body>
</html>
