name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: false
        type: string
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        type: boolean
        default: false
      dry-run:
        description: 'Dry-run mode (validate without deploying)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  deployments: write
  statuses: write
  packages: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NODE_VERSION: '20'
  DRY_RUN: ${{ github.event.inputs.dry-run || false }}

jobs:
  pre-deployment-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.checks.outputs.should_deploy }}
      version: ${{ steps.version.outputs.version }}
      is-dry-run: ${{ steps.dry-run.outputs.is_dry_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION="$(date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Check dry-run mode
        id: dry-run
        run: |
          if [ "${{ env.DRY_RUN }}" = "true" ]; then
            echo "is_dry_run=true" >> $GITHUB_OUTPUT
            echo "🏃 DRY-RUN MODE ENABLED"
          else
            echo "is_dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate deployment conditions
        id: checks
        run: |
          SHOULD_DEPLOY=true

          # Check if main branch or tagged
          echo "Checking deployment source..."
          if [ "${{ github.ref }}" != "refs/heads/main" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "⚠️ Not on main branch or tag, manual trigger allowed"
          fi

          # Check for required secrets
          echo "Validating required secrets..."
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN secret not set"
            SHOULD_DEPLOY=false
          fi

          if [ "$SHOULD_DEPLOY" = "true" ]; then
            echo "✓ Pre-deployment validation passed"
          fi

          echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT

      - name: Display deployment info
        run: |
          echo "## Production Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry-Run**: ${{ steps.dry-run.outputs.is_dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ref**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  build-and-test:
    name: Build & Comprehensive Tests
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npx tsc --noEmit

      - name: Run unit tests
        if: ${{ !inputs.skip_tests }}
        run: npm run test:coverage

      - name: Run E2E tests
        if: ${{ !inputs.skip_tests }}
        run: |
          npx playwright install --with-deps
          npm run build
          npx playwright test
        continue-on-error: true

      - name: Build production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.PRODUCTION_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify build integrity
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi

          # Check for expected files
          files_to_check=(".next/static" ".next/server" "package.json" "public")
          for file in "${files_to_check[@]}"; do
            if [ ! -e "$file" ]; then
              echo "⚠️ Expected file/directory not found: $file"
            fi
          done

          echo "✓ Build integrity verified"

      - name: Calculate bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY

          if [ -d ".next/static" ]; then
            STATIC_SIZE=$(du -sh .next/static 2>/dev/null | cut -f1)
            echo "- Static Assets: $STATIC_SIZE" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d ".next/server" ]; then
            SERVER_SIZE=$(du -sh .next/server 2>/dev/null | cut -f1)
            echo "- Server Bundle: $SERVER_SIZE" >> $GITHUB_STEP_SUMMARY
          fi

          TOTAL_SIZE=$(du -sh .next 2>/dev/null | cut -f1)
          echo "- Total (.next): $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            .next
            public
            package.json
            package-lock.json
          retention-days: 7

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, build-and-test]
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check dry-run mode
        id: dry-run-check
        run: |
          if [ "${{ needs.pre-deployment-checks.outputs.is-dry-run }}" = "true" ]; then
            echo "is_dry_run=true" >> $GITHUB_OUTPUT
          else
            echo "is_dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Dry-run deployment (if enabled)
        if: steps.dry-run-check.outputs.is_dry_run == 'true'
        run: |
          echo "🏃 DRY-RUN MODE: Skipping actual Vercel deployment"
          echo "Build artifacts validated successfully"
          echo "Would deploy version: ${{ needs.pre-deployment-checks.outputs.version }}"
          echo "Would deploy to: ${{ secrets.PRODUCTION_APP_URL }}"

      - name: Install Vercel CLI
        if: steps.dry-run-check.outputs.is_dry_run == 'false'
        run: npm install -g vercel

      - name: Deploy to Vercel Production
        if: steps.dry-run-check.outputs.is_dry_run == 'false'
        id: deployment
        run: |
          DEPLOYMENT_URL=$(vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --confirm \
            --prod=true)
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "✓ Production deployment initiated: $DEPLOYMENT_URL"

      - name: Create GitHub deployment
        if: steps.dry-run-check.outputs.is_dry_run == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deployment.outputs.deployment_url }}';
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Production deployment v${{ needs.pre-deployment-checks.outputs.version }}',
              auto_merge: false,
              required_contexts: [],
              production_environment: true
            }).then(deployment => {
              github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                description: 'Production deployment successful',
                environment_url: deploymentUrl,
                auto_inactive: false
              });
            });

      - name: Create release notes
        if: steps.dry-run-check.outputs.is_dry_run == 'false' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.split('/').pop();
            const commits = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: tag
            });

            const releaseNotes = commits.data.commits
              .map(c => `- ${c.commit.message}`)
              .join('\n');

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: releaseNotes,
              draft: false,
              prerelease: false
            });

  post-deployment-validation:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-production]
    if: always()
    timeout-minutes: 20
    steps:
      - name: Check dry-run status
        id: dry-run-status
        run: |
          if [ "${{ needs.pre-deployment-checks.outputs.is-dry-run }}" = "true" ]; then
            echo "is_dry_run=true" >> $GITHUB_OUTPUT
            echo "🏃 DRY-RUN MODE - Skipping post-deployment validation"
          else
            echo "is_dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for deployment to stabilize
        if: steps.dry-run-status.outputs.is_dry_run == 'false'
        run: sleep 60

      - name: Health check
        if: steps.dry-run-status.outputs.is_dry_run == 'false'
        run: |
          HEALTH_URL="${{ secrets.PRODUCTION_APP_URL }}/api/health"
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Health check attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"

            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")

            if [ "$RESPONSE" = "200" ]; then
              echo "✓ Production health check passed"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              sleep 10
            fi
          done

          echo "❌ Production health check failed"
          exit 1

      - name: Verify critical functionality
        if: steps.dry-run-status.outputs.is_dry_run == 'false'
        run: |
          echo "Verifying critical production endpoints..."

          endpoints=(
            "/api/health"
            "/en"
            "/he"
            "/en/auth/login"
          )

          FAILED=0
          for endpoint in "${endpoints[@]}"; do
            echo "Checking $endpoint..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_APP_URL }}$endpoint")
            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 401 ]; then
              echo "  ✓ OK (HTTP $HTTP_CODE)"
            else
              echo "  ❌ FAILED (HTTP $HTTP_CODE)"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "❌ $FAILED endpoint(s) failed"
            exit 1
          fi

          echo "✓ All critical endpoints verified"

      - name: Run production smoke tests
        if: steps.dry-run-status.outputs.is_dry_run == 'false'
        run: |
          npm install -g @playwright/test
          cat > prod-smoke-test.mjs << 'EOF'
          import { chromium } from 'playwright';

          const baseUrl = process.env.PRODUCTION_APP_URL || 'https://dive-drop.app';
          const browser = await chromium.launch();
          const page = await browser.newPage();

          try {
            console.log('Running production smoke tests...');

            // Test homepage load time
            console.log('Testing homepage...');
            const startTime = Date.now();
            await page.goto(baseUrl, { waitUntil: 'domcontentloaded', timeout: 30000 });
            const loadTime = Date.now() - startTime;
            console.log(`✓ Homepage loaded in ${loadTime}ms`);

            if (loadTime > 5000) {
              console.warn('⚠ Load time is slower than expected');
            }

            console.log('\n✓ Production smoke tests passed');
            process.exit(0);
          } catch (error) {
            console.error('❌ Production smoke test failed:', error.message);
            process.exit(1);
          } finally {
            await browser.close();
          }
          EOF

          PRODUCTION_APP_URL="${{ secrets.PRODUCTION_APP_URL }}" node prod-smoke-test.mjs
        continue-on-error: true

  monitoring-alerts:
    name: Setup Monitoring Alerts
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-production, post-deployment-validation]
    if: always()
    steps:
      - name: Check deployment status
        id: status
        run: |
          if [ "${{ needs.post-deployment-validation.result }}" = "success" ] || [ "${{ needs.pre-deployment-checks.outputs.is-dry-run }}" = "true" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=warning" >> $GITHUB_OUTPUT
          fi

      - name: Send deployment notification
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.status }}';
            const isDryRun = '${{ needs.pre-deployment-checks.outputs.is-dry-run }}' === 'true';
            const emoji = isDryRun ? '🏃' : status === 'success' ? '✅' : '⚠️';
            const mode = isDryRun ? '[DRY-RUN] ' : '';

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${emoji} **${mode}Production Deployment**: ${{ needs.pre-deployment-checks.outputs.version }}\n\n[View in Vercel](${{ secrets.PRODUCTION_APP_URL }})\n\n**Status**: ${status.toUpperCase()}`
            });

  rollback-procedure:
    name: Rollback Plan Available
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Generate rollback instructions
        run: |
          echo "## Rollback Procedure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If production deployment failed or has critical issues:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option 1: Vercel UI Rollback" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Vercel Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "2. Select DIVE DROP project" >> $GITHUB_STEP_SUMMARY
          echo "3. Click Deployments tab" >> $GITHUB_STEP_SUMMARY
          echo "4. Find previous stable deployment" >> $GITHUB_STEP_SUMMARY
          echo "5. Click '...' and select 'Promote to Production'" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option 2: GitHub Actions Rollback" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Actions > Deploy to Production" >> $GITHUB_STEP_SUMMARY
          echo "2. Find the previous successful deployment" >> $GITHUB_STEP_SUMMARY
          echo "3. Click 'Run workflow'" >> $GITHUB_STEP_SUMMARY
          echo "4. Provide previous version tag" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option 3: Git Tag Rollback" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "git checkout previous-stable-tag" >> $GITHUB_STEP_SUMMARY
          echo "git push origin HEAD:main --force  # Use with caution" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
