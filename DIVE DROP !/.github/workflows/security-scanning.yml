name: Security Scanning & SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry-run mode (no fixes applied)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  DRY_RUN: ${{ github.event.inputs.dry-run || false }}

jobs:
  dependency-check:
    name: Dependency Vulnerability Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Parse audit results
        run: |
          node <<'EOF'
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('npm-audit-report.json', 'utf8'));
            const vulnerabilities = report.metadata?.vulnerabilities || {};
            console.log('Vulnerability Summary:');
            console.log(`Critical: ${vulnerabilities.critical || 0}`);
            console.log(`High: ${vulnerabilities.high || 0}`);
            console.log(`Moderate: ${vulnerabilities.moderate || 0}`);
            console.log(`Low: ${vulnerabilities.low || 0}`);
          } catch (e) {
            console.log('Error parsing audit report:', e.message);
          }
          EOF

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  semgrep:
    name: Semgrep SAST Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/typescript
          generateSarif: true
          sarif_output: semgrep-results.sarif

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: ['javascript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{ matrix.language }}"

  secrets-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  env-security:
    name: Environment & Security Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded credentials
        run: |
          echo "Scanning for hardcoded credentials..."
          # Check for common credential patterns
          if grep -r "password\s*=\|api[_-]?key\s*=\|secret\s*=" src/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" | grep -v "\.example\|\.sample"; then
            echo "⚠️ Potential hardcoded credentials found - review needed"
          else
            echo "✓ No obvious hardcoded credentials detected"
          fi
        continue-on-error: true

      - name: Validate environment file structure
        run: |
          echo "Validating .env.example structure..."
          if [ -f .env.example ]; then
            echo "✓ .env.example found"
            echo "Environment variables:"
            grep "=" .env.example | sed 's/^/  - /'
          else
            echo "⚠️ .env.example not found"
          fi

      - name: Check for exposed secrets in git history
        run: |
          echo "Checking recent git history for accidental commits..."
          # Check last 10 commits
          git log --all --pretty=format:"%h %s" -10 | sed 's/^/  /'
          echo ""
          echo "⚠️ Review commit messages and content for accidental secret exposure"
        continue-on-error: true

  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Next.js security headers
        run: |
          echo "Validating Next.js configuration for security best practices..."

          # Check for security headers in next.config
          if grep -i "securityheaders\|headers\|strict" next.config.ts; then
            echo "✓ Security configuration found in next.config.ts"
          else
            echo "⚠️ Consider adding security headers configuration"
          fi

          # Verify TypeScript strict mode
          if grep -i "strict.*true" tsconfig.json; then
            echo "✓ TypeScript strict mode enabled"
          else
            echo "⚠️ TypeScript strict mode should be enabled for security"
          fi

  dependency-report:
    name: Generate Dependency Report
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          npm install -g @cyclonedx/npm
          cyclonedx-npm --output-file sbom.json || echo "SBOM generation not available"
        continue-on-error: true

      - name: List dependencies
        run: |
          echo "# Dependency Report" > dependency-report.md
          echo "" >> dependency-report.md
          echo "## Direct Dependencies" >> dependency-report.md
          npm list --depth=0 >> dependency-report.md || true
          echo "" >> dependency-report.md
          echo "## Security Audit Status" >> dependency-report.md
          npm audit --json --production > /dev/null 2>&1 && echo "✓ No critical vulnerabilities" >> dependency-report.md || echo "⚠️ See npm-audit-report for details" >> dependency-report.md

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            dependency-report.md
            sbom.json
          retention-days: 30

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [dependency-check, semgrep, codeql, secrets-scanning]
    steps:
      - name: Generate security summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep SAST: ${{ needs.semgrep.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL Analysis: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Detection: ${{ needs.secrets-scanning.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommended Actions" >> $GITHUB_STEP_SUMMARY
          echo "1. Review any flagged issues in the Security tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Address high/critical severity findings" >> $GITHUB_STEP_SUMMARY
          echo "3. Update dependencies if security updates are available" >> $GITHUB_STEP_SUMMARY
