<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0f172a;--card:#1e293b;--card2:#263348;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#60a5fa;--orange:#fb923c}

  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}

  .m-btn{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.85rem;white-space:nowrap;transition:all .15s}

  .m-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .m-btn.allbtn{background:#0e3a2a;border-color:#15803d;color:#86efac}
  .m-btn.allbtn.active{background:#16a34a;border-color:#16a34a;color:#fff}
  /* kpi */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:20px 0 24px}
  .kpi-card{background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border)}
  .kpi-card .lbl{font-size:.76rem;color:var(--muted);margin-bottom:6px}
  .kpi-card .val{font-size:1.5rem;font-weight:700}
  .kpi-card .sub2{font-size:.72rem;color:var(--muted);margin-top:4px}
  .green .val{color:var(--green)}.red .val{color:var(--red)}.blue .val{color:var(--blue)}.orange .val{color:var(--orange)}
  /* charts */
  .charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:24px}
  @media(max-width:860px){.charts-grid{grid-template-columns:1fr}}
  .chart-card{background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border)}
  .chart-card h3{color:var(--muted);font-size:.9rem;margin-bottom:14px}
  .chart-wrap{position:relative;height:260px}
  /* panel */
  .section-title{font-size:1.05rem;font-weight:700;color:var(--blue);margin:8px 0 14px}
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  #search{flex:1;min-width:200px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem}
  #search::placeholder{color:var(--muted)}
  .cat-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .cat-btn{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:5px 13px;cursor:pointer;font-size:.78rem;transition:all .15s}
  .cat-btn:hover{border-color:var(--accent)}
  .cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .panel{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:0;margin-bottom:18px;overflow:hidden}
  .tbl-wrap{overflow-x:auto;max-height:520px;overflow-y:auto}
  table{width:100%;border-collapse:collapse;font-size:.83rem}
  thead{position:sticky;top:0;background:#1e3a5f;z-index:5}
  th{padding:10px 11px;text-align:right;color:#93c5fd;font-weight:600;border-bottom:2px solid var(--accent);white-space:nowrap;cursor:pointer;user-select:none}
  th:hover{color:#fff}
  td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--border)}
  tr:nth-child(even) td{background:rgba(255,255,255,.02)}
  tr:hover td{background:rgba(59,130,246,.08)}
  .rr{color:var(--red);font-weight:600}.gg{color:var(--green);font-weight:600}.yy{color:var(--yellow)}
  .tag{padding:2px 7px;border-radius:8px;font-size:.72rem;background:var(--border);white-space:nowrap}
  .muted-row td{color:var(--muted);text-align:center;padding:24px}
  .flag-item{background:#1c1010;border:1px solid #991b1b;border-radius:8px;padding:11px 15px;margin-bottom:8px}
  .flag-item .ft{color:var(--red);font-weight:700;font-size:.85rem}
  .flag-item .fd{font-size:.82rem;color:var(--muted);margin-top:3px}
  .sep{border:none;border-top:1px solid var(--border);margin:24px 0}
  footer{text-align:center;padding:22px;color:#64748b;font-size:.78rem;border-top:1px solid var(--border);margin-top:30px}
  .row-count{font-size:.78rem;color:var(--muted)}
</style>

const HE = {"1": "ינואר", "2": "פברואר", "3": "מרץ", "4": "אפריל", "5": "מאי", "6": "יוני", "7": "יולי", "8": "אוגוסט", "9": "ספטמבר", "10": "אוקטובר", "11": "נובמבר", "12": "דצמבר"};
const FMT = n => '₪' + (+n).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});
const FMT0 = n => '₪' + Math.round(+n).toLocaleString('he-IL');
const keys = Object.keys(MONTHS).sort();
function mLabel(k){const [y,m]=k.split('-');return HE[+m]+' '+y;}

let state = {month:'all', cat:'all', search:'', sortKey:'d', sortDir:1};
let charts = {};

// flatten all txns with month tag
const ALL = [];
keys.forEach(k => MONTHS[k].forEach(t => ALL.push({...t, _m:k})));

function curTxns(){
  let rows = state.month==='all' ? ALL : ALL.filter(t=>t._m===state.month);
  return rows;
}

function buildMonthBar(){
  const bar = document.getElementById('month-bar');
  const allB = document.createElement('button');
  allB.className='m-btn allbtn'+(state.month==='all'?' active':'');
  allB.textContent='📊 כל החודשים';
  allB.onclick=()=>{state.month='all';refresh();};
  bar.appendChild(allB);
  keys.forEach(k=>{
    const b=document.createElement('button');
    b.className='m-btn'+(state.month===k?' active':'');
    b.textContent=mLabel(k);
    b.onclick=()=>{state.month=k;state.cat='all';state.search='';document.getElementById('search').value='';refresh();};
    bar.appendChild(b);
  });
}

function buildKPI(){
  const rows = curTxns();
  const income = rows.reduce((s,t)=>s+t.crd,0);
  const expense = rows.reduce((s,t)=>s+t.deb,0);
  const net = income-expense;
  let endBal = '—';
  if(state.month!=='all'){
    const mr = MONTHS[state.month];
    if(mr.length) endBal = FMT0(mr[mr.length-1].bal);
  } else {
    const last = MONTHS[keys[keys.length-1]];
    if(last.length) endBal = FMT0(last[last.length-1].bal);
  }
  document.getElementById('period-label').textContent = state.month==='all' ? 'תצוגה: כל החודשים' : 'תצוגה: '+mLabel(state.month);
  const g=document.getElementById('kpi-grid');
  g.innerHTML=`
    <div class="kpi-card green"><div class="lbl">סה"כ הכנסות</div><div class="val">${FMT0(income)}</div></div>
    <div class="kpi-card red"><div class="lbl">סה"כ הוצאות</div><div class="val">${FMT0(expense)}</div></div>
    <div class="kpi-card ${net>=0?'green':'red'}"><div class="lbl">יתרה נטו</div><div class="val">${FMT0(net)}</div></div>
    <div class="kpi-card blue"><div class="lbl">${state.month==='all'?'יתרה נוכחית':'יתרה סוף חודש'}</div><div class="val">${endBal}</div></div>
    <div class="kpi-card orange"><div class="lbl">מספר תנועות</div><div class="val">${rows.length}</div></div>`;
}

function buildTrend(){
  const title=document.getElementById('trend-title');
  if(charts.trend) charts.trend.destroy();
  if(state.month==='all'){
    title.textContent='📈 מגמת הכנסות והוצאות לפי חודש';
    const labels=keys.map(mLabel);
    const inc=keys.map(k=>MONTHS[k].reduce((s,t)=>s+t.crd,0));
    const exp=keys.map(k=>MONTHS[k].reduce((s,t)=>s+t.deb,0));
    charts.trend=new Chart(document.getElementById('chart-trend'),{
      type:'bar',
      data:{labels,datasets:[
        {label:'הכנסות',data:inc,backgroundColor:'#22c55e',borderRadius:3},
        {label:'הוצאות',data:exp,backgroundColor:'#ef4444',borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#94a3b8'}}},
        scales:{x:{ticks:{color:'#64748b',maxRotation:60,minRotation:45,font:{size:9}},grid:{color:'#1e293b'}},
                y:{ticks:{color:'#64748b',callback:v=>'₪'+(v/1000)+'k'},grid:{color:'#334155'}}}}
    });
  } else {
    title.textContent='📈 מהלך היתרה במהלך החודש';
    const mr=MONTHS[state.month];
    const labels=mr.map(t=>t.d.slice(8));
    const bal=mr.map(t=>t.bal);
    charts.trend=new Chart(document.getElementById('chart-trend'),{
      type:'line',
      data:{labels,datasets:[{label:'יתרה',data:bal,borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,.15)',fill:true,tension:.25,pointRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'}},
                y:{ticks:{color:'#64748b',callback:v=>'₪'+v.toLocaleString()},grid:{color:'#334155'}}}}
    });
  }
}

function buildPie(){
  const rows=curTxns().filter(t=>t.deb>0);
  const cats={};
  rows.forEach(t=>cats[t.cat]=(cats[t.cat]||0)+t.deb);
  const entries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const labels=entries.map(e=>e[0]), data=entries.map(e=>e[1]);
  const colors=['#2563eb','#dc2626','#16a34a','#ea580c','#7c3aed','#0891b2','#be185d','#92400e','#065f46','#1e40af','#b45309','#9333ea','#0d9488','#db2777','#4338ca','#65a30d','#c2410c'];
  if(charts.pie) charts.pie.destroy();
  charts.pie=new Chart(document.getElementById('chart-pie'),{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#0f172a'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'left',labels:{color:'#94a3b8',font:{size:9},boxWidth:11,padding:6}},
        tooltip:{callbacks:{label:c=>c.label+': '+FMT(c.raw)}}}}
  });
}

function buildCatBar(){
  const rows = state.month==='all'?ALL:ALL.filter(t=>t._m===state.month);
  const present=[...new Set(rows.map(t=>t.cat))];
  const order=['משכורת','הכנסה אחרת','העברה נכנסת','bit נכנס','זיכוי','סיוע בשכר דירה','דירקט - ויזה (חיוב)','דירקט - ויזה (זיכוי)','הוראות קבע','עמלות בנק','ביטוח לאומי',"צ'קים - יוצא","צ'קים - החזרה",'העברה יוצאת','משיכת מזומן - בנקט','הוצאה אחרת','עיקול/קנסות'];
  const sorted=order.filter(c=>present.includes(c)).concat(present.filter(c=>!order.includes(c)));
  const bar=document.getElementById('cat-bar');
  bar.innerHTML='';
  const allb=document.createElement('button');
  allb.className='cat-btn'+(state.cat==='all'?' active':'');
  allb.textContent='הכל ('+rows.length+')';
  allb.onclick=()=>{state.cat='all';refresh();};
  bar.appendChild(allb);
  sorted.forEach(c=>{
    const n=rows.filter(t=>t.cat===c).length;
    const b=document.createElement('button');
    b.className='cat-btn'+(state.cat===c?' active':'');
    b.textContent=c+' ('+n+')';
    b.onclick=()=>{state.cat=c;refresh();};
    bar.appendChild(b);
  });
}

function buildTable(){
  let rows=curTxns();
  if(state.cat!=='all') rows=rows.filter(t=>t.cat===state.cat);
  if(state.search){
    const q=state.search.toLowerCase();
    rows=rows.filter(t=>(t.desc+' '+t.det+' '+t.ref+' '+t.cat+' '+t.d).toLowerCase().includes(q));
  }
  const sk=state.sortKey, dir=state.sortDir;
  rows=[...rows].sort((a,b)=>{
    let x=a[sk],y=b[sk];
    if(sk==='deb'||sk==='crd'||sk==='bal'){x=+x;y=+y;}
    return (x<y?-1:x>y?1:0)*dir;
  });
  document.getElementById('row-count').textContent=rows.length+' תנועות · חובה '+FMT0(rows.reduce((s,t)=>s+t.deb,0))+' · זכות '+FMT0(rows.reduce((s,t)=>s+t.crd,0));
  const tbl=document.getElementById('tbl-main');
  const showMonth = state.month==='all';
  const heads=[['d','תאריך'],...(showMonth?[['_m','חודש']]:[]),['desc','תיאור'],['det','פרטים'],['ref','אסמכתא'],['deb','חובה'],['crd','זכות'],['bal','יתרה'],['cat','קטגוריה']];
  let h='<thead><tr>'+heads.map(([k,l])=>`<th data-k="${k}">${l}${state.sortKey===k?(state.sortDir>0?' ▲':' ▼'):''}</th>`).join('')+'</tr></thead>';
  let body='<tbody>';
  if(!rows.length){body+=`<tr class="muted-row"><td colspan="${heads.length}">אין תנועות התואמות לסינון</td></tr>`;}
  rows.forEach(t=>{
    body+='<tr>'
      +`<td>${t.d}</td>`
      +(showMonth?`<td><span class="tag">${mLabel(t._m)}</span></td>`:'')
      +`<td>${t.desc}</td>`
      +`<td style="color:#94a3b8;font-size:.78rem">${(t.det||'').slice(0,70)}</td>`
      +`<td style="color:#64748b;font-size:.78rem">${t.ref||''}</td>`
      +`<td>${t.deb?`<span class="rr">${FMT(t.deb)}</span>`:''}</td>`
      +`<td>${t.crd?`<span class="gg">${FMT(t.crd)}</span>`:''}</td>`
      +`<td><span class="${t.bal<0?'rr':'yy'}">${FMT(t.bal)}</span></td>`
      +`<td><span class="tag">${t.cat}</span></td>`
      +'</tr>';
  });
  body+='</tbody>';
  tbl.innerHTML=h+body;
  tbl.querySelectorAll('th').forEach(th=>{
    th.onclick=()=>{const k=th.dataset.k;if(state.sortKey===k)state.sortDir*=-1;else{state.sortKey=k;state.sortDir=1;}buildTable();};
  });
}

function buildFlags(){
  const rows=curTxns();
  const flags=rows.filter(t=>t.cat.includes('החזרה')||t.cat==='עיקול/קנסות'||t.bal<0);
  const div=document.getElementById('flags');
  if(!flags.length){div.innerHTML='<p style="color:#94a3b8">אין אזהרות לתצוגה זו ✅</p>';return;}
  // group summary
  const ret=flags.filter(t=>t.cat.includes('החזרה')).length;
  const lien=flags.filter(t=>t.cat==='עיקול/קנסות').length;
  const neg=flags.filter(t=>t.bal<0).length;
  let head=`<p style="color:#94a3b8;margin-bottom:10px;font-size:.85rem">סה"כ ${flags.length} אזהרות: `;
  const parts=[];
  if(ret)parts.push(`❌ ${ret} צ'קים שחזרו`);
  if(lien)parts.push(`⚠️ ${lien} עיקולים/קנסות`);
  if(neg)parts.push(`📉 ${neg} תנועות ביתרה שלילית`);
  head+=parts.join(' · ')+'</p>';
  div.innerHTML=head+flags.slice(0,60).map(t=>`
    <div class="flag-item">
      <div class="ft">${t.cat.includes('החזרה')?"❌ צ'ק חזר":t.cat==='עיקול/קנסות'?'⚠️ עיקול/קנס':'📉 יתרה שלילית'} · ${state.month==='all'?mLabel(t._m)+' · ':''}${t.d}</div>
      <div class="fd">${t.desc} · ${FMT(t.deb||t.crd)} · יתרה ${FMT(t.bal)}${t.det?' · '+t.det.slice(0,60):''}</div>
    </div>`).join('')+(flags.length>60?`<p style="color:#64748b;font-size:.8rem;margin-top:8px">מוצגות 60 הראשונות מתוך ${flags.length}</p>`:'');
}

function refresh(){
  buildMonthBar.done||(buildMonthBar(),buildMonthBar.done=1);
  document.querySelectorAll('#month-bar .m-btn').forEach((b,i)=>{
    const isAll=i===0;b.classList.toggle('active',(isAll&&state.month==='all')||(!isAll&&keys[i-1]===state.month));
  });
  buildKPI();buildTrend();buildPie();buildCatBar();buildTable();buildFlags();
}

document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;buildTable();});
document.addEventListener('DOMContentLoaded',()=>{buildMonthBar();buildMonthBar.done=1;refresh();});
</script>
</body>
</html>
