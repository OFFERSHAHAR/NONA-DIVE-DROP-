<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1" />
    <link rel="stylesheet" href="obs-styles.css" />
    <title>DiveDrop Free Diving</title>
  </head>
  <body>
    <main class="scene">
      <img class="scene-bg" src="assets/obs-bg-free-diving.png" alt="" />
      <div class="shade"></div>
      <header class="topbar">
        <img class="logo" src="assets/obs-logo-white.png" alt="DiveDrop" />
        <div class="pill">צלילה חופשית והשכרת ציוד</div>
      </header>
      <img class="floating-asset" src="assets/obs-diver.png" alt="" />
      <section class="content">
        <div class="copy">
          <span class="eyebrow">חלק חדש במערכת</span>
          <h1>אימונים, דיסציפלינות וציוד בתוך אותו WebApp</h1>
          <p class="lead">CWT, FIM, STA ו־DYN מוצגים כפעילויות מוכנות להזמנה, עם בטיחות, בן זוג, מדריך וציוד.</p>
        </div>
        <div class="panel">
          <div class="steps">
            <div class="step"><div class="num">CWT</div><div><strong>משקל קבוע</strong><span>אימון עומק עם סנפירים</span></div></div>
            <div class="step"><div class="num">FIM</div><div><strong>צלילה בחבל</strong><span>טכניקה ואיזון לחצים</span></div></div>
            <div class="step"><div class="num">STA</div><div><strong>אפניאה סטטית</strong><span>נשימה, רוגע ובקרה</span></div></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
