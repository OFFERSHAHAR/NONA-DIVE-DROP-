document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#ff8f52)\" stroke-width=\"2\"><\u002Fpolyline>\n      <circle cx=\"30\" cy=\"55\" r=\"2.5\" fill=\"var(--accent,#ff8f52)\"><\u002Fcircle>\n      <circle cx=\"72\" cy=\"38\" r=\"2.5\" fill=\"var(--accent,#ff8f52)\"><\u002Fcircle>\n      <circle cx=\"114\" cy=\"22\" r=\"2.5\" fill=\"var(--accent,#ff8f52)\"><\u002Fcircle>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <svg viewBox=\"0 0 560 460\" preserveAspectRatio=\"none\" style=\"position:absolute;right:0;bottom:0;width:34vw;height:46vh;overflow:visible;opacity:.9;transform:scaleX(-1);\">\n    <defs>\n      <linearGradient id=\"zbR\" x1=\"0\" y1=\"1\" x2=\"1\" y2=\"0\">\n        <stop offset=\"0\" stop-color=\"var(--accent2,#d9694a)\" stop-opacity=\"0\"><\u002Fstop>\n        <stop offset=\"1\" stop-color=\"var(--accent,#ff8f52)\" stop-opacity=\"1\"><\u002Fstop>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <path d=\"M-40 470 C 140 420, 70 250, 300 150\" fill=\"none\" stroke=\"url(#zbR)\" stroke-width=\"2.5\" stroke-dasharray=\"5 11\" style=\"filter:drop-shadow(0 0 5px var(--accent,#ff8f52));animation:zb-dash 3.6s linear infinite;\"><\u002Fpath>\n    <path d=\"M-20 470 C 180 410, 120 220, 360 110\" fill=\"none\" stroke=\"url(#zbR)\" stroke-width=\"2\" stroke-dasharray=\"4 14\" style=\"filter:drop-shadow(0 0 5px var(--accent,#ff8f52));animation:zb-dash 4.8s linear infinite;\"><\u002Fpath>\n    <path d=\"M20 470 C 220 430, 200 280, 420 200\" fill=\"none\" stroke=\"url(#zbR)\" stroke-width=\"1.5\" stroke-dasharray=\"3 16\" style=\"opacity:.7;animation:zb-dash 6s linear infinite;\"><\u002Fpath>\n    <path d=\"M0 470 C 90 400, 30 300, 150 210\" fill=\"none\" stroke=\"url(#zbR)\" stroke-width=\"3\" stroke-dasharray=\"2 18\" style=\"filter:drop-shadow(0 0 7px var(--accent,#ff8f52));animation:zb-dash 2.9s linear infinite;\"><\u002Fpath>\n  <\u002Fsvg>\n  <div style=\"position:absolute;right:-4vw;bottom:-4vh;width:24vw;height:24vw;background:radial-gradient(circle, var(--glow,rgba(217,119,87,.18)), transparent 68%);filter:blur(8px);\"><\u002Fdiv>\n\n  <!-- ===================== PARTICLES ===================== -->\n  <sc-for list=\"{{ particles }}\" as=\"p\" hint-placeholder-count=\"0\">\n    <div style=\"position:absolute;left:{{p.left}}%;top:{{p.top}}%;width:{{p.size}}px;height:{{p.size}}px;background:{{p.color}};border-radius:{{p.radius}}px;--op:{{p.op}};--sway:{{p.sway}}px;animation:zb-drift {{p.dur}}s linear infinite;animation-delay:{{p.delay}}s;box-shadow:0 0 {{p.glow}}px {{p.color}};\"><\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- ===================== CENTER FLOOR GLOW ===================== -->\n  <div style=\"position:absolute;left:50%;bottom:7%;width:42vw;height:13vh;background:radial-gradient(ellipse at center, var(--glow,rgba(217,119,87,.18)), transparent 70%);filter:blur(14px);animation:zb-breathe 9s ease-in-out infinite;\"><\u002Fdiv>\n\n  <!-- ===================== MASCOTS ===================== -->\n  <sc-if value=\"{{ showMascots }}\" hint-placeholder-val=\"{{ true }}\">\n  <img src=\"6233db90-9a7b-4f1a-a325-4c585bab5d81\" alt=\"Claude\" style=\"position:absolute;left:3.5vw;bottom:4vh;width:8vw;image-rendering:auto;animation:zb-bob 5.4s ease-in-out infinite;filter:drop-shadow(0 10px 26px rgba(217,119,87,.45));\">\n  <img src=\"301983ac-55f7-4cf6-b40c-e034b2f6f3a8\" alt=\"Claude\" style=\"position:absolute;right:3.5vw;bottom:4.5vh;width:8.6vw;image-rendering:auto;animation:zb-bob 6.2s ease-in-out infinite .8s;filter:drop-shadow(0 10px 26px rgba(217,119,87,.45));\">\n  <\u002Fsc-if>\n\n  <!-- ===================== CORNER TITLE ===================== -->\n  <div dir=\"rtl\" style=\"position:absolute;top:4.2vh;right:3.2vw;display:flex;align-items:center;gap:0.7vw;padding:0.7vw 1.1vw;border:1px solid var(--pborder,rgba(255,140,76,.3));border-radius:999px;background:rgba(0,0,0,.22);backdrop-filter:blur(6px);white-space:nowrap;\">\n    <span style=\"width:1.5vw;height:1.5vw;background:var(--accent2,#d9694a);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:0.85vw;color:#1a120d;\">&gt;_<\u002Fspan>\n    <span style=\"font-weight:600;font-size:1.25vw;color:var(--text,#f0eee6);letter-spacing:.2px;\">שיעור: קלוד<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;vibe&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;warm&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;warm&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showMascots&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showPanels&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    particles: Array.from({ length: 52 }, () => {\n      const onLeft = Math.random() < 0.5;\n      const left = onLeft ? Math.random() * 27 : 73 + Math.random() * 27;\n      const r = Math.random();\n      const size = 3 + Math.random() * 7;\n      return {\n        left: +left.toFixed(2),\n        top: +(Math.random() * 100).toFixed(2),\n        size: +size.toFixed(2),\n        radius: Math.random() < 0.55 ? 1 : Math.round(size / 2),\n        op: +(0.28 + Math.random() * 0.5).toFixed(2),\n        sway: +((Math.random() * 2 - 1) * 34).toFixed(1),\n        dur: +(8 + Math.random() * 10).toFixed(1),\n        delay: +(-Math.random() * 16).toFixed(1),\n        glow: +(2 + Math.random() * 6).toFixed(1),\n        _purple: r > 0.86,\n      };\n    }),\n  };\n\n  renderVals() {\n    const vibe = this.props.vibe ?? \"dark\";\n    const palettes = {\n      dark: {\n        bg1: \"#1d130d\", bg2: \"#0b0807\",\n        accent: \"#ff8f52\", accent2: \"#d9694a\",\n        line: \"rgba(255,140,76,.9)\",\n        panel: \"rgba(217,119,87,.05)\",\n        pborder: \"rgba(255,140,76,.25)\",\n        purple: \"#8b7fc4\",\n        glow: \"rgba(217,119,87,.20)\",\n        text: \"#f0eee6\",\n        pAccent: \"#ff8f52\", pPurple: \"#9b8bd4\",\n      },\n      warm: {\n        bg1: \"#5b3525\", bg2: \"#2c1a12\",\n        accent: \"#ef9f78\", accent2: \"#d97757\",\n        line: \"rgba(240,165,115,.9)\",\n        panel: \"rgba(245,238,228,.08)\",\n        pborder: \"rgba(240,200,160,.3)\",\n        purple: \"#b29bd6\",\n        glow: \"rgba(240,185,135,.26)\",\n        text: \"#f7f1ea\",\n        pAccent: \"#f3b48c\", pPurple: \"#bda5e0\",\n      },\n    };\n    const pal = palettes[vibe] || palettes.dark;\n\n    const particles = this.state.particles.map((p) => ({\n      ...p,\n      color: p._purple ? pal.pPurple : pal.pAccent,\n    }));\n\n    return {\n      ...pal,\n      vibe,\n      particles,\n      showMascots: this.props.showMascots ?? true,\n      showPanels: this.props.showPanels ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
